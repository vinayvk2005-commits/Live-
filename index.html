<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Nearby Recommender</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
}

h1 {
  text-align: center;
  margin-top: 20px;
}

.controls {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin: 20px;
}

input, select, button {
  padding: 12px;
  border-radius: 10px;
  border: none;
}

input, select {
  background: #1e293b;
  color: white;
}

button {
  background: linear-gradient(45deg, #22c55e, #4ade80);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
}

.results {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  border-radius: 15px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

img {
  width: 100%;
  height: 160px;
  object-fit: cover;
}

.content {
  padding: 10px;
}

.rating {
  color: #facc15;
}

.favorite {
  cursor: pointer;
  float: right;
}
</style>
</head>

<body>

<h1>📍 Smart Nearby Recommender</h1>

<div class="controls">
  <select id="mood">
    <option value="date">🍽 Date</option>
    <option value="work">💻 Work</option>
    <option value="chill">🍹 Chill</option>
  </select>

  <select id="budget">
    <option value="low">Low Budget</option>
    <option value="medium">Medium Budget</option>
    <option value="high">High Budget</option>
  </select>

  <button onclick="showPlaces()">Find Places</button>
</div>

<div class="results" id="results"></div>

<script>
const data = {
  date: [
    {name:"Romantic Dinner", budget:"high"},
    {name:"Cafe Date", budget:"medium"},
    {name:"Street Food Date", budget:"low"}
  ],
  work: [
    {name:"Quiet Cafe", budget:"medium"},
    {name:"Library", budget:"low"},
    {name:"Co-working Space", budget:"high"}
  ],
  chill: [
    {name:"Bar Lounge", budget:"high"},
    {name:"Gaming Cafe", budget:"medium"},
    {name:"Park Hangout", budget:"low"}
  ]
};

function randomImage(type){
  return `https://source.unsplash.com/400x300/?${type}`;
}

function randomRating(){
  return (Math.random()*1.5 + 3.5).toFixed(1);
}

function showPlaces(){
  const mood = document.getElementById("mood").value;
  const budget = document.getElementById("budget").value;
  const results = document.getElementById("results");

  results.innerHTML = "";

  const filtered = data[mood].filter(p => p.budget === budget);

  if(filtered.length === 0){
    results.innerHTML = "❌ No places found";
    return;
  }

  filtered.forEach(place => {
    results.innerHTML += `
      <div class="card">
        <img src="${randomImage(place.name)}"/>
        <div class="content">
          <span class="favorite" onclick="toggleFav(this)">🤍</span>
          <h3>${place.name}</h3>
          <p class="rating">⭐ ${randomRating()}</p>
          <p>💰 ${place.budget}</p>
        </div>
      </div>
    `;
  });
}

function toggleFav(el){
  el.innerText = el.innerText === "🤍" ? "❤️" : "🤍";
}
</script>

</body>
</html>
